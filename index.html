<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Mermaid.js Renderer</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>

    <meta
        name="description"
        content="Render and share Mermaid diagrams instantly via URL. Paste your Mermaid markdown, get a shareable link — no login required."
    />
    <meta property="og:title" content="Mermaid Diagram Renderer" />
    <meta
        property="og:description"
        content="Render and share Mermaid diagrams instantly via URL."
    />
    <meta property="og:type" content="website" />
    <meta
        property="og:url"
        content="https://stebaker92.github.io/mermaid-diagram-web/"
    />
    <link
        rel="canonical"
        href="https://stebaker92.github.io/mermaid-diagram-web/"
    />

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧜‍♀️</text></svg>">
    <link rel='stylesheet' type='text/css' media='screen' href='main.css'>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-fork-ribbon-css/0.2.3/gh-fork-ribbon.min.css" />
    <script src='main.js'></script>
</head>

<body>
    <h1>Mermaid Diagram Renderer</h1>
    <p>
        Render a Mermaid diagram using markdown from the browser's query params.
        <br/>Share diagrams easily via URL!
    </p>

    <div class="toolbar">
        <button class="btn btn-primary" id="editBtn">Edit Diagram</button>
        <button class="btn btn-secondary" id="shareBtn">Share</button>
        <button class="btn btn-secondary" id="downloadSvgBtn">Download SVG</button>
        <button class="btn btn-secondary" id="downloadPngBtn">Download PNG</button>
        <a class="btn btn-secondary" href="https://mermaid.js.org/intro/" target="_blank" rel="noopener">Mermaid Docs ↗</a>
    </div>

    <h2></h2>
    <div class="mermaid"> </div>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal-box">
            <h3>Edit Diagram</h3>
            <label class="modal-label" for="titleInput">Title (optional)</label>
            <input id="titleInput" class="title-input" type="text" placeholder="My Diagram" />
            <label class="modal-label" for="diagramInput">Diagram</label>
            <textarea id="diagramInput" class="diagram-textarea" placeholder="Paste your Mermaid diagram here..."></textarea>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancelBtn">Cancel</button>
                <button class="btn btn-primary" id="updateBtn">Update</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <a class="github-fork-ribbon" href="https://github.com/stebaker92/mermaid-diagram-web" data-ribbon="View me on GitHub" title="Fork me on GitHub">View me on GitHub</a>
</body>

</html>
